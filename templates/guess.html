{% extends "base.html" %}

{% block title %}Impostor Guess{% endblock %}

{% block content %}
  <h1>Impostor Final Guess</h1>
  <p class="muted">The impostor was found. They get one last chance to guess the word.</p>

  <form method="post" class="stack">
    <div>
      <label for="guess">Secret word guess</label>
      <input id="guess" type="text" name="guess" placeholder="Enter the secret word" required>
    </div>
    <button type="submit">Submit Guess</button>
  </form>
{% endblock %}
