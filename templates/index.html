{% extends "base.html" %}

{% block title %}Impostor Game{% endblock %}

{% block content %}
  <!-- <h1>Impostor Game</h1> -->
  <p class="muted">Set up the round first, then add player names in the lobby.</p>

  <form method="post" class="stack">
    <div>
      <label for="player_count">Number of players</label>
      <input id="player_count" type="number" name="player_count" min="3" max="12" value="4" required>
    </div>

    <div>
      <label for="category">Category</label>
      <select id="category" name="category">
        {% for category in categories %}
          <option value="{{ category }}">{{ category }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="difficulty">Difficulty</label>
      <select id="difficulty" name="difficulty">
        <option value="easy">Easy</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <button type="submit">Continue to Lobby</button>
  </form>
{% endblock %}
