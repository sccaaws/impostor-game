{% extends "base.html" %}

{% block title %}Pass the Device{% endblock %}

{% block content %}
  <div class="center">
    <h1>Pass the Device</h1>
    <p class="muted">Give the device to:</p>
  </div>

  <div class="card center pass-highlight-card">
    <div class="pass-player-label">Next Player</div>
    <div class="pass-player-name">{{ player_name }}</div>
  </div>

  <div class="center">
    <p class="muted">When only {{ player_name }} can see the screen, continue.</p>
  </div>

  <form method="get" action="{{ url_for('reveal', player_number=player_number) }}">
    <button type="submit" class="button-primary">Continue</button>
  </form>
{% endblock %}
